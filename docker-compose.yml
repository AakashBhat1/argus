# ── Named volumes ─────────────────────────────────────────────────────────────
# roi_events_data  – ROI event jsonl written by backend (kept for future consumers)
# models_data      – OpenVINO model files (mount or pre-populate externally)
# postgres_data    – Postgres database files (surveillance DB)
volumes:
  roi_events_data:
  models_data:
  postgres_data:
  certbot_conf:
  certbot_www:

# ── Services ──────────────────────────────────────────────────────────────────
services:

  # ── Postgres (db:5432) ──────────────────────────────────────────────────────
  # Backend and chatbot connect here. Backend creates tables on first run.
  db:
    image: postgres:15-alpine
    container_name: intruder-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: surveillance
      # Set POSTGRES_PASSWORD in a root .env file (or the shell) for any
      # deployment; the fallback below is for local development only.
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-surveillance}
      POSTGRES_DB: surveillance
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U surveillance -d surveillance"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── Backend API ───────────────────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: backend/yolo_classifier/Dockerfile
    container_name: intruder-backend
    restart: unless-stopped
    ports:
      # Localhost-only: the internet reaches the API through nginx (80/443).
      - "127.0.0.1:8000:8000"
    env_file:
      - backend/yolo_classifier/.env
    environment:
      PYTHONUNBUFFERED: "1"
      # Use Postgres in Docker (db service)
      DATABASE_URL: postgresql+asyncpg://surveillance:${POSTGRES_PASSWORD:-surveillance}@db:5432/surveillance
      # Block 8: enable MediaMTX dynamic path registration inside Compose network.
      MEDIAMTX_ENABLED: "true"
      MEDIAMTX_API_BASE_URL: http://mediamtx:9997
      MEDIAMTX_REQUEST_TIMEOUT_SECONDS: "3"
      MEDIAMTX_API_USERNAME: mtx_api
      MEDIAMTX_API_PASSWORD: ${MEDIAMTX_API_PASSWORD:-mtx_api_change_me}
    volumes:
      # Backend writes roi_events.jsonl here; chatbot reads from the same volume
      - roi_events_data:/app/backend/yolo_classifier/intrusion_monitor
      # Mount model files at runtime (avoids baking large binaries into the image)
      - models_data:/app/backend/yolo_classifier/models
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health')"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3

  # ── Frontend ──────────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # Baked into the Next.js build; the rewrite in next.config.js proxies
        # /api/* → http://backend:8000/api/* at the server side.
        NEXT_PRIVATE_BACKEND_URL: http://backend:8000
        NEXT_PUBLIC_API_URL: /api/v1
        # Path-only URLs resolve against the page origin, so ws:// vs wss://
        # and http vs https follow whatever scheme nginx serves.
        NEXT_PUBLIC_WS_URL: /ws
        NEXT_PUBLIC_MEDIAMTX_URL: /stream
    container_name: intruder-frontend
    restart: unless-stopped
    ports:
      # Localhost-only: the internet reaches the app through nginx (80/443).
      - "127.0.0.1:3001:3001"
    environment:
      NODE_ENV: production
      NEXT_PRIVATE_BACKEND_URL: http://backend:8000
      NEXT_PUBLIC_API_URL: /api/v1
      HOSTNAME: 0.0.0.0
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3001/ || exit 1"]
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 3

  # ── MediaMTX (RTSP / WebRTC media server) ─────────────────────────────────────
  mediamtx:
    image: bluenviron/mediamtx:latest
    container_name: intruder-mediamtx
    restart: unless-stopped
    ports:
      - "8554:8554"                 # RTSP ingest (restrict source IP in the security group)
      - "127.0.0.1:8889:8889"       # WebRTC HTTP signalling — proxied by nginx at /stream/
      - "8189:8189/udp"             # WebRTC media (must stay public for browsers)
      - "127.0.0.1:9997:9997"       # REST API — internal only, never public
    environment:
      # Override the placeholder passwords in mediamtx.yml. Set these in a
      # root .env file (or the shell) for any real deployment.
      MTX_AUTHINTERNALUSERS_0_PASS: ${MEDIAMTX_API_PASSWORD:-mtx_api_change_me}
      MTX_AUTHINTERNALUSERS_1_PASS: ${MEDIAMTX_PUBLISH_PASSWORD:-mtx_publish_change_me}
      # Public IP or domain of this host: advertised to browsers in WebRTC
      # ICE candidates so the UDP media path (8189) is reachable from outside.
      MTX_WEBRTCADDITIONALHOSTS: ${MEDIAMTX_PUBLIC_HOST:-127.0.0.1}
    volumes:
      - ./mediamtx.yml:/mediamtx.yml:ro
    healthcheck:
      test: ["CMD", "/mediamtx", "--version"]
      interval: 30s
      timeout: 10s
      start_period: 10s
      retries: 3

  # ── Nginx (public entrypoint, ports 80/443) ──────────────────────────────────
  # The only service the internet should talk to (besides RTSP ingest 8554 and
  # WebRTC UDP 8189). Starts on plain HTTP; run scripts/setup-tls.sh once a
  # domain points at this host to switch to HTTPS.
  nginx:
    image: nginx:1.27-alpine
    container_name: intruder-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot_conf:/etc/letsencrypt:ro
      - certbot_www:/var/www/certbot:ro
    depends_on:
      - frontend
      - backend
      - mediamtx
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Certbot (TLS certificates, on-demand) ─────────────────────────────────────
  # Not started by `docker compose up`; invoked by scripts/setup-tls.sh via
  # `docker compose run --rm certbot ...` and by the renewal cron.
  certbot:
    image: certbot/certbot
    container_name: intruder-certbot
    profiles: ["tls"]
    volumes:
      - certbot_conf:/etc/letsencrypt
      - certbot_www:/var/www/certbot

  # ── Demo Relays (Big Buck Bunny, Sintel, Tears of Steel) ──────────────────────
  # Relays public HLS streams to MediaMTX internally for multi-camera testing.
  cam2-relay:
    image: jrottenberg/ffmpeg:6.1-alpine
    container_name: intruder-cam2-relay
    restart: unless-stopped
    command: >
      -re -i https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8
      -c:v libx264 -preset veryfast -tune zerolatency -an
      -f rtsp -rtsp_transport tcp
      rtsp://mtx_publisher:${MEDIAMTX_PUBLISH_PASSWORD:-mtx_publish_change_me}@mediamtx:8554/live/cam2
    depends_on:
      mediamtx:
        condition: service_healthy

  cam3-relay:
    image: jrottenberg/ffmpeg:6.1-alpine
    container_name: intruder-cam3-relay
    restart: unless-stopped
    command: >
      -re -i https://bitdash-a.akamaihd.net/content/sintel/hls/playlist.m3u8
      -c:v libx264 -preset veryfast -tune zerolatency -an
      -f rtsp -rtsp_transport tcp
      rtsp://mtx_publisher:${MEDIAMTX_PUBLISH_PASSWORD:-mtx_publish_change_me}@mediamtx:8554/live/cam3
    depends_on:
      mediamtx:
        condition: service_healthy

  cam4-relay:
    image: jrottenberg/ffmpeg:6.1-alpine
    container_name: intruder-cam4-relay
    restart: unless-stopped
    command: >
      -re -i https://demo.unified-streaming.com/k8s/features/stable/video/tears-of-steel/tears-of-steel.ism/.m3u8
      -c:v libx264 -preset veryfast -tune zerolatency -an
      -f rtsp -rtsp_transport tcp
      rtsp://mtx_publisher:${MEDIAMTX_PUBLISH_PASSWORD:-mtx_publish_change_me}@mediamtx:8554/live/cam4
    depends_on:
      mediamtx:
        condition: service_healthy
