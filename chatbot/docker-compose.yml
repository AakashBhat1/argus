# docker-compose.yml – Intruder Detection Chatbot
# Runs: chatbot (FastAPI) + ollama (LLM)
# Usage:
#   docker compose up -d
#   docker compose exec ollama ollama pull qwen2.5:0.5b
#   docker compose exec chatbot python run_ingestion.py   # first-time index build

services:

  # ── Ollama LLM ─────────────────────────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    restart: unless-stopped
    # Port is intentionally NOT published to the host.
    # The chatbot reaches Ollama over the internal Docker network.
    # To manage models from the host, temporarily add:
    #   ports: ["127.0.0.1:11434:11434"]
    volumes:
      - ollama_models:/root/.ollama
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:11434/api/tags > /dev/null"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 5
    networks:
      - chatbot_net

  # ── Chatbot API ────────────────────────────────────────────────────────────
  chatbot:
    build:
      context: .
      dockerfile: Dockerfile
    image: intruder-chatbot:latest
    container_name: chatbot
    restart: unless-stopped
    ports:
      # Bind only to localhost; use Nginx/ALB in front of this in production.
      # Change to "0.0.0.0:8001:8001" if accessing directly without a proxy.
      - "127.0.0.1:8001:8001"
    env_file:
      - .env
    environment:
      # Route LLM requests to the ollama service over the internal network.
      OLLAMA_ENDPOINT: http://ollama:11434/api/generate
      # Models are volume-mounted; allow HuggingFace download on first run.
      EMBEDDING_LOCAL_FILES_ONLY: "0"
      RERANKER_LOCAL_FILES_ONLY: "0"
    volumes:
      - chatbot_data:/app/project/data
      - chatbot_models:/app/models/embedding
    depends_on:
      ollama:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:8001/health"]
      interval: 30s
      timeout: 10s
      start_period: 90s
      retries: 3
    networks:
      - chatbot_net

networks:
  chatbot_net:
    driver: bridge

volumes:
  chatbot_data:
    # Stores FAISS index, documents.pkl, embeddings.npy, checkpoint files.
    # Back this up to S3 regularly (see scripts/backup-index.sh).
  chatbot_models:
    # HuggingFace cache for embedding + reranker models (~400 MB).
    # Persisted to avoid re-downloading on container restart.
  ollama_models:
    # Ollama model store (~400 MB for qwen2.5:0.5b).
